# GCP Cloud Build configuration

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/deepdive-web:latest',
      '.'
    ]
    timeout: '1800s'  # 30 minutes for build

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/deepdive-web:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'deepdive-web'
      - '--image=gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=TURSO_DATABASE_URL=TURSO_DATABASE_URL:latest,TURSO_AUTH_TOKEN=TURSO_AUTH_TOKEN:latest,JWT_SECRET=JWT_SECRET:latest,MORALIS_API_KEY=MORALIS_API_KEY:latest,COVALENT_API_KEY=COVALENT_API_KEY:latest,NEXT_PUBLIC_RPC_ETHEREUM=NEXT_PUBLIC_RPC_ETHEREUM:latest,NEXT_PUBLIC_RPC_ARBITRUM=NEXT_PUBLIC_RPC_ARBITRUM:latest,NEXT_PUBLIC_RPC_BASE=NEXT_PUBLIC_RPC_BASE:latest,NEXT_PUBLIC_RPC_POLYGON=NEXT_PUBLIC_RPC_POLYGON:latest'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--port=8080'

images:
  - 'gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/deepdive-web:latest'

timeout: '3600s'  # 1 hour total timeout

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  diskSizeGb: 100
