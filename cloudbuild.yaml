# GCP Cloud Build configuration

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/deepdive-web:latest',
      '.'
    ]

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/deepdive-web:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'deepdive-web'
      - '--image=gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=TURSO_DATABASE_URL=TURSO_DATABASE_URL:latest,TURSO_AUTH_TOKEN=TURSO_AUTH_TOKEN:latest,JWT_SECRET=JWT_SECRET:latest,MORALIS_API_KEY=MORALIS_API_KEY:latest,COVALENT_API_KEY=COVALENT_API_KEY:latest,ETHERSCAN_API_KEY=ETHERSCAN_API_KEY:latest,ARBISCAN_API_KEY=ARBISCAN_API_KEY:latest,BASESCAN_API_KEY=BASESCAN_API_KEY:latest,POLYGONSCAN_API_KEY=POLYGONSCAN_API_KEY:latest,NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=WALLETCONNECT_PROJECT_ID:latest,QUANT_ENGINE_URL=QUANT_ENGINE_URL:latest'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--max-instances=10'
      - '--min-instances=0'

images:
  - 'gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/deepdive-web:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
