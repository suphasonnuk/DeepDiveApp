steps:
  # ── 1. Build quant engine image ──────────────────────────────────────────────
  - id: build-quant
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/deepdive-quant:latest
      - services/quant-engine
    timeout: 600s

  # ── 2. Push quant engine image ────────────────────────────────────────────────
  - id: push-quant
    name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/deepdive-quant:latest]
    waitFor: [build-quant]

  # ── 3. Deploy quant engine to Cloud Run ──────────────────────────────────────
  - id: deploy-quant
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - deepdive-quant
      - --image=gcr.io/$PROJECT_ID/deepdive-quant:latest
      - --region=asia-southeast3
      - --platform=managed
      - --no-allow-unauthenticated
      - --set-secrets=BINANCE_TESTNET_API_KEY=BINANCE_TESTNET_API_KEY:latest,BINANCE_TESTNET_SECRET=BINANCE_TESTNET_SECRET:latest
      - --memory=1Gi
      - --cpu=1
      - --timeout=600
      - --max-instances=3
      - --min-instances=0
      - --port=8080
    waitFor: [push-quant]

  # ── 4. Get quant engine URL ───────────────────────────────────────────────────
  - id: get-quant-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services describe deepdive-quant \
          --region=asia-southeast3 --format="value(status.url)" | tr -d '[:space:]' > /workspace/quant_url.txt
        echo "Quant engine URL: $$(cat /workspace/quant_url.txt)"
    waitFor: [deploy-quant]

  # ── 5. Build web app image ────────────────────────────────────────────────────
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/deepdive-web:latest
      - .
    timeout: 1800s
    waitFor: [get-quant-url]

  # ── 6. Push web image ─────────────────────────────────────────────────────────
  - id: push-web
    name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/deepdive-web:latest]
    waitFor: [build-web]

  # ── 7. Deploy web app to Cloud Run ───────────────────────────────────────────
  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy deepdive-web \
          --image=gcr.io/$PROJECT_ID/deepdive-web:latest \
          --region=asia-southeast3 \
          --platform=managed \
          --no-allow-unauthenticated \
          --set-secrets=TURSO_DATABASE_URL=TURSO_DATABASE_URL:latest,TURSO_AUTH_TOKEN=TURSO_AUTH_TOKEN:latest,JWT_SECRET=JWT_SECRET:latest,QUICKNODE_URL=QUICKNODE_URL:latest,COVALENT_API_KEY=COVALENT_API_KEY:latest,BINANCE_TESTNET_API_KEY=BINANCE_TESTNET_API_KEY:latest,BINANCE_TESTNET_SECRET=BINANCE_TESTNET_SECRET:latest \
          --set-env-vars="QUANT_ENGINE_URL=$$(cat /workspace/quant_url.txt),BINANCE_LEVERAGE=3" \
          --memory=2Gi \
          --cpu=2 \
          --timeout=300 \
          --max-instances=5 \
          --min-instances=0 \
          --port=8080
    waitFor: [push-web]

  # ── 8. Grant public access (parallel, non-fatal) ──────────────────────────────
  - id: allow-unauthenticated-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services add-iam-policy-binding deepdive-web \
          --region=asia-southeast3 \
          --member="allUsers" \
          --role="roles/run.invoker" || echo "IAM binding skipped"
    waitFor: [deploy-web]

  - id: allow-unauthenticated-quant
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services add-iam-policy-binding deepdive-quant \
          --region=asia-southeast3 \
          --member="allUsers" \
          --role="roles/run.invoker" || echo "IAM binding skipped"
    waitFor: [deploy-quant]

  # ── 9. Wire quant engine CORS to the real web URL (auto, no manual hash needed)
  - id: update-quant-cors
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        WEB_URL=$(gcloud run services describe deepdive-web \
          --region=asia-southeast3 --format="value(status.url)" | tr -d '[:space:]')
        echo "Setting FRONTEND_URL to $$WEB_URL"
        gcloud run services update deepdive-quant \
          --region=asia-southeast3 \
          --update-env-vars=FRONTEND_URL=$$WEB_URL
    waitFor: [allow-unauthenticated-web, allow-unauthenticated-quant]

timeout: 3600s

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  diskSizeGb: 100
  substitutionOption: ALLOW_LOOSE
