steps:
  # ── 1. Build quant engine image ──────────────────────────────────────────────
  - id: build-quant
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/deepdive-quant:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/deepdive-quant:latest
      - services/quant-engine
    timeout: 600s

  # ── 2. Push quant engine image ────────────────────────────────────────────────
  - id: push-quant
    name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/deepdive-quant:$COMMIT_SHA]
    waitFor: [build-quant]

  # ── 3. Deploy quant engine to Cloud Run ──────────────────────────────────────
  - id: deploy-quant
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - deepdive-quant
      - --image=gcr.io/$PROJECT_ID/deepdive-quant:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=BINANCE_TESTNET_API_KEY=BINANCE_TESTNET_API_KEY:latest,BINANCE_TESTNET_SECRET=BINANCE_TESTNET_SECRET:latest
      - --set-env-vars=FRONTEND_URL=https://deepdive-web-${_WEB_SERVICE_HASH}-uc.a.run.app
      - --memory=1Gi
      - --cpu=1
      - --timeout=600
      - --max-instances=3
      - --min-instances=0
      - --port=8080
    waitFor: [push-quant]

  # ── 4. Get quant engine URL ───────────────────────────────────────────────────
  - id: get-quant-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services describe deepdive-quant \
          --region=us-central1 --format="value(status.url)" | tr -d '[:space:]' > /workspace/quant_url.txt
        echo "Quant engine URL: $(cat /workspace/quant_url.txt)"
    waitFor: [deploy-quant]

  # ── 5. Build web app image ────────────────────────────────────────────────────
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/deepdive-web:latest
      - .
    timeout: 1800s
    waitFor: [get-quant-url]

  # ── 6. Push web image ─────────────────────────────────────────────────────────
  - id: push-web
    name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA]
    waitFor: [build-web]

  # ── 7. Deploy web app to Cloud Run ───────────────────────────────────────────
  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy deepdive-web \
          --image=gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --set-secrets=TURSO_DATABASE_URL=TURSO_DATABASE_URL:latest,TURSO_AUTH_TOKEN=TURSO_AUTH_TOKEN:latest,JWT_SECRET=JWT_SECRET:latest,QUICKNODE_URL=QUICKNODE_URL:latest,COVALENT_API_KEY=COVALENT_API_KEY:latest,BINANCE_TESTNET_API_KEY=BINANCE_TESTNET_API_KEY:latest,BINANCE_TESTNET_SECRET=BINANCE_TESTNET_SECRET:latest \
          --set-env-vars="QUANT_ENGINE_URL=$(cat /workspace/quant_url.txt),BINANCE_LEVERAGE=3" \
          --memory=2Gi \
          --cpu=2 \
          --timeout=300 \
          --max-instances=5 \
          --min-instances=0 \
          --port=8080
    waitFor: [push-web]

images:
  - gcr.io/$PROJECT_ID/deepdive-web:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/deepdive-web:latest
  - gcr.io/$PROJECT_ID/deepdive-quant:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/deepdive-quant:latest

timeout: 3600s

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  diskSizeGb: 100

# Substitution variables — set in Cloud Build trigger or --substitutions flag
substitutions:
  _WEB_SERVICE_HASH: ""   # fill after first deploy to set FRONTEND_URL on quant engine
